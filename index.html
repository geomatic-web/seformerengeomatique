<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Se former en Géomatique - Jean-Baptiste Kibora</title>
  <meta name="description" content="Apprenez la géomatique avec Jean-Baptiste Kibora. Tutoriels vidéo pour ArcGIS, QGIS et outils SIG.">
  <meta name="keywords" content="géomatique, SIG, ArcGIS, QGIS, tutoriels vidéo, formation en ligne">
  <meta name="author" content="Jean-Baptiste Kibora">

  <!-- Open Graph -->
  <meta property="og:title" content="Se former en Géomatique - Jean-Baptiste Kibora">
  <meta property="og:description" content="Regardez toutes les vidéos tutoriels de géomatique avec Jean-Baptiste Kibora.">
  <meta property="og:image" content="https://yt3.ggpht.com/OSg1bOXHHu9pe8hFlTPFIj_zLvbu1JKpGM8SWhkSgwZg9IjBeQ8CF7lmtEPFiNQGzmYj-84T_Iw=s600-c-k-c0x00ffffff-no-rj-rp-mo">
  <meta property="og:url" content="https://ton-site-web.com">
  <meta property="og:type" content="website">

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; }
    header { background: #2c3e50; color: white; text-align: center; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    header a { color: #f39c12; text-decoration: underline; }
    header img { width: 60px; border-radius: 50%; margin-right: 10px; vertical-align: middle; }
    .header-title { display: flex; align-items: center; font-size: 1.5em; margin-bottom: 5px; }
    main { margin: 20px; }

    .main-video {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin-bottom: 30px;
      position: relative;
    }
    #mainPlayer {
      width: 100%;
      max-width: 900px;
      height: 500px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.35);
      cursor: pointer;
      transition: transform 0.3s;
    }
    #mainPlayer:hover { transform: scale(1.02); }

    #currentTitle {
      margin-top: 10px;
      font-size: 1.2em;
      text-align: center;
      color: #2c3e50;
      max-width: 90%;
      word-wrap: break-word;
    }

    .controls { margin-top: 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    button {
      background: #2c3e50;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.3s, transform 0.2s;
    }
    button:hover { background: #34495e; transform: scale(1.05); }

    .thumbnails {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 20px;
      justify-content: center;
    }
    .thumbnail {
      cursor: pointer;
      flex: 0 0 auto;
      border: 3px solid transparent;
      border-radius: 8px;
      transition: border 0.3s, transform 0.2s;
    }
    .thumbnail.active { border: 3px solid #f39c12; transform: scale(1.05); }
    .thumbnail img {
      width: 160px;
      border-radius: 8px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .thumbnail img:hover { transform: scale(1.08); }

    /* Responsive */
    @media (max-width: 768px) {
      #mainPlayer { height: 300px; }
      .thumbnail img { width: 120px; }
    }
    @media (max-width: 480px) {
      #mainPlayer { height: 220px; }
      .thumbnail img { width: 100px; }
      .header-title { font-size: 1.2em; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">
      <img src="https://yt3.ggpht.com/OSg1bOXHHu9pe8hFlTPFIj_zLvbu1JKpGM8SWhkSgwZg9IjBeQ8CF7lmtEPFiNQGzmYj-84T_Iw=s600-c-k-c0x00ffffff-no-rj-rp-mo" alt="Logo chaîne">
      Se former en Géomatique
    </div>
    <p>Regardez toutes mes vidéos directement ici 👇</p>
    <p>Formateur : <a href="https://doyoubuzz.com/jean-baptiste-kibora" target="_blank">Jean-Baptiste Kibora</a></p>
  </header>

  <main>
    <!-- Vidéo principale -->
    <section class="main-video">
      <div id="mainPlayer"></div>
      <h2 id="currentTitle"></h2>
      <div class="controls">
        <button id="prevBtn">⬅️ Précédent</button>
        <button id="nextBtn">➡️ Suivant</button>
      </div>
    </section>

    <!-- Miniatures -->
    <section class="thumbnails" id="thumbnails"></section>
  </main>

  <script>
    const apiKey = "AIzaSyCpm3GRsd1InPjeFJgA9vANu3tPMY222p8"; 
    const channelId = "UCwjUnlXoWvX4PAcMK2Xj4JA"; 
    const maxResults = 12;

    let videoList = []; 
    let currentIndex = 0;
    let player;

    // Charger l’API YouTube
    let tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    function loadVideo(index) {
      if (videoList[index]) {
        currentIndex = index;
        player.loadVideoById(videoList[index].id);
        document.getElementById("currentTitle").textContent = videoList[index].title;

        const thumbnailsDiv = document.getElementById("thumbnails");
        Array.from(thumbnailsDiv.children).forEach((thumb, i) => {
          thumb.classList.toggle("active", i === index);
        });

        const activeThumb = thumbnailsDiv.children[index];
        activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center' });
      }
    }

    function prevVideo() { loadVideo((currentIndex - 1 + videoList.length) % videoList.length); }
    function nextVideo() { loadVideo((currentIndex + 1) % videoList.length); }

    document.getElementById("prevBtn").addEventListener("click", prevVideo);
    document.getElementById("nextBtn").addEventListener("click", nextVideo);

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("mainPlayer", {
        height: "500",
        width: "100%",
        videoId: "",
        events: { "onStateChange": onPlayerStateChange }
      });
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) nextVideo();
    }

    fetch(`https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet,id&order=date&maxResults=${maxResults}`)
      .then(response => response.json())
      .then(data => {
        data.items.forEach(item => {
          if (item.id.videoId) {
            const videoId = item.id.videoId;
            const title = item.snippet.title;
            const thumbnailUrl = item.snippet.thumbnails.medium.url;

            videoList.push({ id: videoId, title, thumbnail: thumbnailUrl });

            const thumb = document.createElement("div");
            thumb.classList.add("thumbnail");
            thumb.innerHTML = `<img src="${thumbnailUrl}" alt="${title}" title="${title}">`;
            thumb.addEventListener("click", () => loadVideo(videoList.findIndex(v => v.id === videoId)));
            document.getElementById("thumbnails").appendChild(thumb);
          }
        });

        let checkReady = setInterval(() => {
          if (player && player.loadVideoById) {
            clearInterval(checkReady);
            loadVideo(0);
          }
        }, 500);
      })
      .catch(err => {
        console.error("Erreur API YouTube:", err);
        document.getElementById("thumbnails").innerHTML = "<p>❌ Impossible de charger les vidéos. Vérifie ta clé API.</p>";
      });

    // Plein écran au clic sur la vidéo
    document.addEventListener('click', function(e){
      if(e.target.closest('#mainPlayer')){
        const iframe = document.getElementById('mainPlayer');
        if(iframe.requestFullscreen){ iframe.requestFullscreen(); }
        else if(iframe.webkitRequestFullscreen){ iframe.webkitRequestFullscreen(); }
        else if(iframe.msRequestFullscreen){ iframe.msRequestFullscreen(); }
      }
    });
  </script>
</body>
</html>
